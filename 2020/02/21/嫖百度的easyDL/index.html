><br><span class="line">response = requests.get(host)</span><br><span class="line"><span class="keyword">if</span>(response):</span><br><span class="line">	con = response.json()</span><br><span class="line">	access_token = con[<span class="string">'access_token'</span>]</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">get_file_content</span><span class="params">(file_path)</span>:</span></span><br><span class="line">	<span class="keyword">with</span> open(file_path, <span class="string">'rb'</span>) <span class="keyword">as</span> fb:</span><br><span class="line">		<span class="keyword">return</span> fb.read()</span><br><span class="line"><span class="keyword">if</span> access_token != <span class="string">''</span>:</span><br><span class="line">	image = get_file_content(file_path)</span><br><span class="line">	image_base64 = base64.b64encode(image)</span><br><span class="line">	image_base64_utf8 = str(image_base64, encoding = <span class="string">'utf-8'</span>)</span><br><span class="line">	request_url = <span class="string">"https://aip.baidubce.com/rpc/2.0/ai_custom/v1/detection/galaxy_rubbish"</span></span><br><span class="line"></span><br><span class="line">	request_url += <span class="string">"?access_token="</span> + access_token</span><br><span class="line">	s = json.dumps(&#123;<span class="string">'image'</span>:image_base64_utf8&#125;)</span><br><span class="line">	response = requests.post(request_url, data = s, headers = &#123;<span class="string">'Content-Type'</span>:<span class="string">'application/json'</span>&#125;)</span><br><span class="line">	content = response.json()</span><br><span class="line">	results = content[<span class="string">'results'</span>]</span><br><span class="line">	print(results)</span><br><span class="line">	image = cv2.imread(file_path)</span><br><span class="line">	cv2.namedWindow(<span class="string">"capture"</span>,<span class="number"> <script>
    function viewer_init() {
        let pswpElement = document.querySelectorAll('.pswp')[0];
        let $imgArr = document.querySelectorAll(('.article-entry img:not(.reward-img)'))

        $imgArr.forEach(($em, i) => {
            $em.onclick = () => {
                // slider展开状态
                // todo: 这样不好，后面改成状态
                if (document.querySelector('.left-col.show')) return
                let items = []
                $imgArr.forEach(($em2, i2) => {
                    let img = $em2.getAttribute('data-idx', i2)
                    let src = $em2.getAttribute('data-target') || $em2.getAttribute('src')
                    let title = $em2.getAttribute('alt')
                    // 获得原图尺寸
                    const image = new Image()
                    image.src = src
                    items.push({
                        src: src,
                        w: image.width || $em2.width,
                        h: image.height || $em2.height,
                        title: title
                    })
                })
                var gallery = new PhotoSwipe(pswpElement, PhotoSwipeUI_Default, items, {
                    index: parseInt(i)
                });
                gallery.init()
            }
        })
    }
    viewer_init()
</script>
